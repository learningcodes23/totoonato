<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Unordered List Tutorial</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .video-wrapper video, .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        h2 { color: #333; }
        ul { background: #eef2ff; padding: 20px 40px; border-radius: 8px; }
        li { margin-bottom: 8px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>How to Create an Unordered List</h2>
    
    <div class="video-wrapper">
        <video controls>
            <source src="ict_pt.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        </div>

    <hr>

    <h3>Key Takeaways:</h3>
    
    <ul>
        <li>Use the <code>&lt;ul&gt;</code> tag to start the list.</li>
        <li>Each item inside the list must use the <code>&lt;li&gt;</code> tag.</li>
        <li>Unordered lists use bullets by default.</li>
        <li>You can change bullet styles using the CSS <code>list-style-type</code> property.</li>
    </ul>
</div>

</body>
</html>
